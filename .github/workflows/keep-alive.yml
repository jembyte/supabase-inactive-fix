name: Supabase Keep-Alive

# This workflow is OPT-IN and will NOT run automatically.
# You must set the ENABLE_GITHUB_ACTIONS repository variable to 'true' to activate it.
# See README.md for setup instructions.

on:
  schedule:
    # Runs at 08:00 and 21:00 UTC+7, every 2 days, between day 1 and 31
    - cron: '0 1,14 1-31/2 * *'

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    # Only run if the ENABLE_GITHUB_ACTIONS variable is set to 'true'
    # This prevents the workflow from running unintentionally
    #if: vars.ENABLE_GITHUB_ACTIONS == 'true'
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Environment
        env:
          ENV: ${{ secrets.SUPABASE_ENV }}
        if: ${{ env.ENV != '' }}
        run: echo "$ENV" > .env

      - name: Set up Config
        env:
          CONFIG: ${{ secrets.SUPABASE_CONFIG }}
        if: ${{ env.CONFIG != '' }}
        run: echo "$CONFIG" > config.json

      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install -U pip
          python3 -m pip install -r requirements.txt

      - name: Run keep-alive script
        run: |
          source venv/bin/activate
          python3 main.py

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 3
